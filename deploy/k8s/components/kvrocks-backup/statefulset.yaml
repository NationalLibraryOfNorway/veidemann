apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kvrocks
spec:
  template:
    spec:
      containers:
        - name: kvrocks
          env:
            - name: KVROCKS_BACKUP_ENABLED
              value: "true"
            - name: KVROCKS_BACKUP_ROOT
              value: /var/lib/kvrocks-backups
            - name: KVROCKS_BGSAVE_CRON
              value: 0 4 * * *
            - name: KVROCKS_MAX_BACKUP_TO_KEEP
              value: "1"
            - name: KVROCKS_MAX_BACKUP_KEEP_HOURS
              value: "24"
          volumeMounts:
            - name: shared-backups
              mountPath: /var/lib/kvrocks-backups
      volumes:
        - name: shared-backups
          persistentVolumeClaim:
            claimName: kvrocks-backups