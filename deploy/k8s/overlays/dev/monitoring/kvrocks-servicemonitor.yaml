apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kvrocks
  labels:
    app.kubernetes.io/name: kvrocks
    app.kubernetes.io/component: metrics
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kvrocks
      app.kubernetes.io/component: metrics
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
