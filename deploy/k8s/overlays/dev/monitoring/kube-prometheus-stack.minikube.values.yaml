fullnameOverride: kube-prometheus-stack

crds:
  enabled: true

grafana:
  enabled: true
  adminPassword: admin
  service:
    type: ClusterIP

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - veidemann.test
    path: /grafana
    pathType: Prefix

  grafana.ini:
    server:
      domain: veidemann.test
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: true

    auth:
      disable_login_form: true

    auth.anonymous:
      enabled: true
      org_role: Admin

prometheus:
  enabled: true

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - veidemann.test
    paths:
      - /prometheus
    pathType: Prefix

  prometheusSpec:
    routePrefix: /prometheus
    externalUrl: http://veidemann.test/prometheus

    retention: 2d
    retentionSize: 2GB
    scrapeInterval: 15s
    evaluationInterval: 15s

    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}


    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

    storageSpec: {}

alertmanager:
  enabled: false

kube-state-metrics:
  enabled: true

prometheus-node-exporter:
  enabled: true

defaultRules:
  create: true
