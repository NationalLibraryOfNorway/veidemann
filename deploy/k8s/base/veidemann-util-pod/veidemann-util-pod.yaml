apiVersion: v1
kind: Pod
metadata:
  name: veidemann-util-pod
spec:
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    fsGroup: 1000
  restartPolicy: Never
  volumes:
    - name: oos
      persistentVolumeClaim:
        claimName: veidemann-oos
        readOnly: true
    - name: warcs
      persistentVolumeClaim:
        claimName: veidemann-warcs
        readOnly: true
    - name: backup
      persistentVolumeClaim:
        claimName: veidemann-backup
        readOnly: true
  containers:
    - name: warc-inspector-image
      image: ghcr.io/nlnwa/veidemann-warc-inspector-image:3.0.0
      securityContext:
        allowPrivilegeEscalation: false
      workingDir: /mnt
      args:
        - "-c"
        - "trap : TERM INT; sleep infinity & wait"
      volumeMounts:
        - mountPath: "/mnt/backup"
          name: backup
        - mountPath: "/mnt/warcs"
          name: warcs
        - mountPath: "/mnt/oos"
          name: oos
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 100Mi
