apiVersion: v1
kind: ConfigMap
metadata:
  name: kvrocks-config
  labels:
    app.kubernetes.io/name: kvrocks
    app.kubernetes.io/component: datastore
data:
  kvrocks.conf: |
    bind 0.0.0.0 ::
    port 6666
    dir /var/lib/kvrocks
    db-name veidemann.kvrocks
    log-level info
    workers 2
    max-db-size 75
    slave-read-only yes
    slave-priority 100
    rocksdb.block_cache_size 512
    rocksdb.write_buffer_size 64
    rocksdb.max_write_buffer_number 2
    rocksdb.max_background_jobs 2
    rocksdb.wal_size_limit_mb 8192