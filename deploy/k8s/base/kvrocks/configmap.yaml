apiVersion: v1
kind: ConfigMap
metadata:
  name: kvrocks-config
  labels:
    app.kubernetes.io/name: kvrocks
    app.kubernetes.io/component: datastore
data:
  kvrocks.conf: |
    bind 0.0.0.0 ::
    port 6666
    dir /var/lib/kvrocks
    db-name veidemann.kvrocks
    log-level info
    slave-read-only yes
    slave-priority 100