apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kvrocks
  labels:
    app.kubernetes.io/name: kvrocks
    app.kubernetes.io/component: datastore
spec:
  replicas: 3
  serviceName: kvrocks-headless
  podManagementPolicy: Parallel
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app.kubernetes.io/name: kvrocks
      app.kubernetes.io/component: datastore
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kvrocks
        app.kubernetes.io/component: datastore
    spec:
      serviceAccountName: kvrocks
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: kvrocks
                    app.kubernetes.io/component: datastore
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: kvrocks
              app.kubernetes.io/component: datastore
      containers:
        - name: kvrocks
          image: apache/kvrocks:2.15.0
          command:
            - /bin/sh
            - /scripts/kvrocks-start.sh
          ports:
            - name: kvrocks
              containerPort: 6666
              protocol: TCP
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kvrocks-auth
                  key: redis-password
            - name: SENTINEL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kvrocks-auth
                  key: sentinel-password
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - /scripts/kvrocks-prestop.sh
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - REDISCLI_AUTH="${REDIS_PASSWORD}" redis-cli -h 127.0.0.1 -p 6666 ping | grep -q PONG
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - /scripts/kvrocks-readiness.sh
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - REDISCLI_AUTH="${REDIS_PASSWORD}" redis-cli -h 127.0.0.1 -p 6666 ping | grep -q PONG
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/kvrocks
            - name: kvrocks-config
              mountPath: /config
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: kvrocks-generated
              mountPath: /etc/kvrocks/generated
        - name: metrics-exporter
          image: docker.io/kvrocks/kvrocks_exporter:1.0.2
          args:
            - -kvrocks.addr=kvrocks://127.0.0.1:6666
            - -kvrocks.password=$(REDIS_PASSWORD)
            - -web.listen-address=:9121
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kvrocks-auth
                  key: redis-password
          ports:
            - name: metrics
              containerPort: 9121
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
        - name: sentinel
          image: docker.io/redis:7.2.13-alpine
          command:
            - /bin/sh
            - /scripts/sentinel-start.sh
          ports:
            - name: sentinel
              containerPort: 26379
              protocol: TCP
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kvrocks-auth
                  key: redis-password
            - name: SENTINEL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kvrocks-auth
                  key: sentinel-password
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - REDISCLI_AUTH="${SENTINEL_PASSWORD}" redis-cli -h 127.0.0.1 -p 26379 ping | grep -q PONG
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - /scripts/sentinel-readiness.sh
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - REDISCLI_AUTH="${SENTINEL_PASSWORD}" redis-cli -h 127.0.0.1 -p 26379 ping | grep -q PONG
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/kvrocks
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: kvrocks-config
          configMap:
            name: kvrocks-config
        - name: scripts
          configMap:
            name: kvrocks-scripts
            defaultMode: 0755
        - name: kvrocks-generated
          emptyDir: {}
