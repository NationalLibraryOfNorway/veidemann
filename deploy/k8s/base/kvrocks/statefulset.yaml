apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kvrocks
  labels:
    app.kubernetes.io/name: kvrocks
    app.kubernetes.io/component: datastore
spec:
  replicas: 3
  serviceName: kvrocks-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: kvrocks
      app.kubernetes.io/component: datastore
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kvrocks
        app.kubernetes.io/component: datastore
    spec:
      serviceAccountName: kvrocks
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      containers:
        - name: kvrocks
          image: apache/kvrocks:2.15.0
          command:
            - /bin/sh
            - /scripts/kvrocks-start.sh
          ports:
            - name: kvrocks
              containerPort: 6666
              protocol: TCP
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kvrocks-auth
                  key: redis-password
                  optional: true
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - /scripts/kvrocks-prestop.sh
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - if [ -n "${REDIS_PASSWORD:-}" ]; then REDISCLI_AUTH="${REDIS_PASSWORD}" redis-cli -h 127.0.0.1 -p 6666 ping; else redis-cli -h 127.0.0.1 -p 6666 ping; fi | grep -q PONG
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - if [ -n "${REDIS_PASSWORD:-}" ]; then REDISCLI_AUTH="${REDIS_PASSWORD}" redis-cli -h 127.0.0.1 -p 6666 ping; else redis-cli -h 127.0.0.1 -p 6666 ping; fi | grep -q PONG
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - if [ -n "${REDIS_PASSWORD:-}" ]; then REDISCLI_AUTH="${REDIS_PASSWORD}" redis-cli -h 127.0.0.1 -p 6666 ping; else redis-cli -h 127.0.0.1 -p 6666 ping; fi | grep -q PONG
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/kvrocks
            - name: kvrocks-config
              mountPath: /config
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: kvrocks-generated
              mountPath: /etc/kvrocks/generated
        - name: sentinel
          image: docker.io/redis:7.2.13-alpine
          command:
            - /bin/sh
            - /scripts/sentinel-start.sh
          ports:
            - name: sentinel
              containerPort: 26379
              protocol: TCP
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kvrocks-auth
                  key: redis-password
                  optional: true
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -h 127.0.0.1 -p 26379 ping | grep -q PONG
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -h 127.0.0.1 -p 26379 ping | grep -q PONG
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -h 127.0.0.1 -p 26379 ping | grep -q PONG
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: sentinel-generated
              mountPath: /etc/sentinel/generated
      volumes:
        - name: kvrocks-config
          configMap:
            name: kvrocks-config
        - name: scripts
          configMap:
            name: kvrocks-scripts
            defaultMode: 0755
        - name: kvrocks-generated
          emptyDir: {}
        - name: sentinel-generated
          emptyDir: {}
